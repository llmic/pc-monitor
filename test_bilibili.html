<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站封面测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        input {
            padding: 8px;
            width: 300px;
            margin-right: 10px;
        }
        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 20px;
        }
        #coverImage {
            max-width: 400px;
            margin-top: 10px;
            display: none;
        }
        #logs {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 4px 0;
        }
        .log-error {
            color: red;
        }
        .log-success {
            color: green;
        }
        #proxyStatus {
            margin-top: 10px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>B站封面获取测试</h1>
    
    <div class="test-section">
        <h3>代理状态</h3>
        <div id="proxyStatus">正在检测代理...</div>
    </div>
    
    <div class="test-section">
        <h3>输入 BV 号</h3>
        <input type="text" id="bvInput" placeholder="例如: BV1t1o9B6EXT" value="BV1t1o9B6EXT">
        <button onclick="testFetch()">测试获取</button>
        
        <div id="result">
            <h4>结果:</h4>
            <div id="videoInfo"></div>
            <img id="coverImage" alt="封面">
        </div>
    </div>
    
    <div class="test-section">
        <h3>日志:</h3>
        <div id="logs"></div>
    </div>

    <script>
        // 从 main.js 复制的代码
        const BV_REGEX = /BV[0-9a-zA-Z]{10}/;
        const BILI_API_URL = 'https://api.bilibili.com/x/web-interface/view';

        // CORS代理服务列表 - 按优先级尝试（代理3优先）
        const CORS_PROXIES = [
            'https://api.codetabs.com/v1/proxy?quest=',
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url=',
            'https://api.allorigins.win/raw?url='
        ];

        // 检测到的最佳代理
        let bestProxy = null;

        // B站视频信息缓存
        const bilibiliVideoCache = {};

        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(message);
        }

        function updateProxyStatus(message) {
            document.getElementById('proxyStatus').innerHTML = message;
        }

        // 从URL或标题中提取BV号
        function extractBVId(text) {
            if (!text) return null;
            const match = text.match(BV_REGEX);
            return match ? match[0] : null;
        }

        // 检测可用的CORS代理
        async function detectBestProxy() {
            if (bestProxy) {
                return bestProxy;
            }
            
            log('开始检测最佳代理...');
            updateProxyStatus('<strong>正在检测代理...</strong>');
            
            // 使用一个公开的测试视频来检测
            const testBvId = 'BV1t1o9B6EXT';
            const testApiUrl = `${BILI_API_URL}?bvid=${testBvId}`;
            
            for (let i = 0; i < CORS_PROXIES.length; i++) {
                try {
                    const proxyUrl = CORS_PROXIES[i] + encodeURIComponent(testApiUrl);
                    log(`检测代理 ${i + 1}: ${proxyUrl}`);
                    
                    const response = await fetch(proxyUrl, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.code === 0) {
                            bestProxy = CORS_PROXIES[i];
                            log(`找到最佳代理: ${bestProxy}`, 'success');
                            updateProxyStatus(`<strong>最佳代理:</strong> ${bestProxy} <span style="color: green;">✓ 可用</span>`);
                            return bestProxy;
                        }
                    }
                } catch (error) {
                    log(`代理 ${i + 1} 检测失败: ${error}`, 'error');
                }
            }
            
            log('所有代理检测失败，将使用 fallback 机制', 'error');
            updateProxyStatus('<span style="color: red;">所有代理不可用，将使用 fallback 机制</span>');
            return null;
        }

        // 尝试多个CORS代理获取数据
        async function fetchWithMultipleProxies(apiUrl) {
            // 如果已有最佳代理，优先使用
            if (bestProxy) {
                try {
                    const proxyUrl = bestProxy + encodeURIComponent(apiUrl);
                    log('使用最佳代理: ' + proxyUrl);
                    
                    const response = await fetch(proxyUrl, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.code === 0) {
                            return data;
                        }
                    }
                    // 最佳代理失效，清除并继续尝试其他代理
                    log('最佳代理失效，重新检测', 'error');
                    bestProxy = null;
                    updateProxyStatus('最佳代理失效，正在重新检测...');
                } catch (error) {
                    log('最佳代理失败: ' + error, 'error');
                    bestProxy = null;
                }
            }
            
            // fallback: 依次尝试所有代理
            for (let i = 0; i < CORS_PROXIES.length; i++) {
                try {
                    const proxyUrl = CORS_PROXIES[i] + encodeURIComponent(apiUrl);
                    log(`尝试代理 ${i + 1}: ${proxyUrl}`);
                    
                    const response = await fetch(proxyUrl, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
                        }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data && data.code === 0) {
                            log(`代理 ${i + 1} 成功`, 'success');
                            bestProxy = CORS_PROXIES[i]; // 缓存这个代理
                            updateProxyStatus(`<strong>最佳代理:</strong> ${bestProxy} <span style="color: green;">✓ 可用</span>`);
                            return data;
                        }
                    }
                } catch (error) {
                    log(`代理 ${i + 1} 失败: ${error}`, 'error');
                }
            }
            throw new Error('All CORS proxies failed');
        }

        // 从B站API获取视频信息
        async function fetchBilibiliVideoInfo(bvId) {
            if (!bvId) return null;
            
            if (bilibiliVideoCache[bvId]) {
                log('使用缓存的视频信息', 'success');
                return bilibiliVideoCache[bvId];
            }
            
            try {
                const apiUrl = `${BILI_API_URL}?bvid=${bvId}`;
                const data = await fetchWithMultipleProxies(apiUrl);
                
                if (data && data.code === 0 && data.data) {
                    const info = data.data;
                    let coverUrl = info.pic || '';
                    
                    if (coverUrl && coverUrl.startsWith('//')) {
                        coverUrl = 'https:' + coverUrl;
                    }
                    
                    const videoInfo = {
                        bvId: bvId,
                        title: info.title,
                        author: info.owner?.name || '',
                        viewCount: info.stat?.view || 0,
                        url: `https://www.bilibili.com/video/${bvId}`,
                        cover: coverUrl
                    };
                    
                    bilibiliVideoCache[bvId] = videoInfo;
                    log('成功获取视频信息', 'success');
                    
                    return videoInfo;
                } else {
                    log('API响应无效: ' + JSON.stringify(data), 'error');
                    return null;
                }
            } catch (error) {
                log('获取视频信息失败: ' + error, 'error');
                return null;
            }
        }

        // 获取封面URL
        async function getBilibiliCoverUrl(bvId) {
            const videoInfo = await fetchBilibiliVideoInfo(bvId);
            if (videoInfo && videoInfo.cover) {
                return videoInfo.cover;
            }
            return null;
        }

        async function testFetch() {
            const bvInput = document.getElementById('bvInput').value;
            const bvId = extractBVId(bvInput);
            
            if (!bvId) {
                log('无效的BV号', 'error');
                return;
            }
            
            log('开始测试获取 BV: ' + bvId);
            
            document.getElementById('videoInfo').innerHTML = '';
            document.getElementById('coverImage').style.display = 'none';
            
            const coverUrl = await getBilibiliCoverUrl(bvId);
            
            if (coverUrl) {
                const videoInfo = bilibiliVideoCache[bvId];
                document.getElementById('videoInfo').innerHTML = `
                    <p><strong>标题:</strong> ${videoInfo.title}</p>
                    <p><strong>作者:</strong> ${videoInfo.author}</p>
                    <p><strong>播放量:</strong> ${videoInfo.viewCount}</p>
                    <p><strong>封面URL:</strong> ${coverUrl}</p>
                `;
                
                const img = document.getElementById('coverImage');
                img.src = coverUrl;
                img.onload = () => {
                    img.style.display = 'block';
                    log('封面加载成功', 'success');
                };
                img.onerror = () => {
                    log('封面加载失败', 'error');
                };
            } else {
                log('无法获取封面', 'error');
            }
        }

        // 页面加载时自动检测代理
        window.onload = async () => {
            await detectBestProxy();
        };
    </script>
</body>
</html>
