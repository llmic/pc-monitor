<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间更新测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-normal { background-color: #28a745; }
        .status-warning { background-color: #ffc107; animation: blink 1s infinite; }
        .status-danger { background-color: #dc3545; animation: blink 0.5s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #currentTimeDisplay { font-size: 24px; font-weight: bold; color: #007bff; }
        #statusText { font-size: 18px; }
        .test-result { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .test-pass { background-color: #d4edda; color: #155724; }
        .test-fail { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>时间更新功能测试</h1>
    
    <div class="mb-3">
        <span class="status-indicator" id="statusLight"></span>
        <span id="statusText" class="fs-5"></span>
    </div>
    
    <div class="mb-3">
        <strong>Current Time:</strong> <span id="currentTimeDisplay"></span>
    </div>
    
    <div class="test-result" id="testResult"></div>
    
    <script>
        // 获取当前时间函数
        function getCurrentTime() {
            const now = new Date();
            const formattedTime = now.getFullYear() + "-" +
                String(now.getMonth() + 1).padStart(2, '0') + "-" +
                String(now.getDate()).padStart(2, '0') + " " +
                String(now.getHours()).padStart(2, '0') + ":" +
                String(now.getMinutes()).padStart(2, '0') + ":" +
                String(now.getSeconds()).padStart(2, '0');
            return formattedTime;
        }

        // 模拟updateStatus功能
        function updateStatus() {
            const statusLight = document.getElementById('statusLight');
            const statusText = document.getElementById('statusText');
            
            // 设置正常状态
            if (statusLight) statusLight.className = 'status-indicator status-normal';
            if (statusText) statusText.innerHTML = '<i>✓</i> Normal - Updating';
        }

        // 页面加载完成后执行
        window.onload = function() {
            console.log('window.onload fired');
            
            // 首次渲染当前时间
            const currentTimeDisplay = document.getElementById('currentTimeDisplay');
            if (currentTimeDisplay) {
                currentTimeDisplay.textContent = getCurrentTime();
                console.log('Initial currentTimeDisplay set to:', getCurrentTime());
            }
            
            // 每秒刷新当前时间
            setInterval(() => {
                const currentTimeDisplay = document.getElementById('currentTimeDisplay');
                if (currentTimeDisplay) {
                    currentTimeDisplay.textContent = getCurrentTime();
                    console.log('currentTimeDisplay updated to:', getCurrentTime());
                }
            }, 1000);
            
            // 更新状态
            updateStatus();
            setInterval(updateStatus, 1000);
            
            // 验证测试
            setTimeout(() => {
                const testResult = document.getElementById('testResult');
                const currentTime = document.getElementById('currentTimeDisplay');
                const statusLight = document.getElementById('statusLight');
                const statusText = document.getElementById('statusText');
                
                let allPassed = true;
                
                // 检查时间显示
                if (currentTime && currentTime.textContent) {
                    console.log('✓ 当前时间显示正常:', currentTime.textContent);
                } else {
                    console.log('✗ 当前时间未显示');
                    allPassed = false;
                }
                
                // 检查状态灯
                if (statusLight && statusLight.classList.contains('status-normal')) {
                    console.log('✓ 状态灯正常亮起');
                } else {
                    console.log('✗ 状态灯未正常亮起');
                    allPassed = false;
                }
                
                // 检查状态文本
                if (statusText && statusText.textContent) {
                    console.log('✓ 状态文本正常显示:', statusText.textContent);
                } else {
                    console.log('✗ 状态文本未显示');
                    allPassed = false;
                }
                
                if (allPassed) {
                    testResult.className = 'test-result test-pass';
                    testResult.innerHTML = '<strong>✓ 所有测试通过！</strong><br>';
                    testResult.innerHTML += '- 当前时间正在实时更新<br>';
                    testResult.innerHTML += '- 状态灯正常亮起<br>';
                    testResult.innerHTML += '- 提示文本正常显示';
                } else {
                    testResult.className = 'test-result test-fail';
                    testResult.innerHTML = '<strong>✗ 测试失败</strong>';
                }
            }, 100);
        };
        
        // 控制台输出验证信息
        console.log('=== 时间更新功能验证 ===');
        console.log('测试页面已加载');
        console.log('请打开浏览器开发者工具(按F12)查看实时日志');
        console.log('检查项目:');
        console.log('1. currentTimeDisplay 元素是否显示并每秒更新');
        console.log('2. statusLight 元素是否有 status-normal 类');
        console.log('3. statusText 元素是否显示 "Normal - Updating"');
    </script>
</body>
</html>
