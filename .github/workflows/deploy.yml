name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
    paths:
      - 'index.html'
      - 'screenshots/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages --force 2>NUL || git checkout gh-pages
          git add -f index.html screenshots/*.png 2>NUL || git add -f index.html
          git diff --quiet || git commit -m "Auto deploy: $(date -u)"
          git push origin gh-pages --force
          echo "✅ Deployed to https://llmic.github.io/pc-monitor/"