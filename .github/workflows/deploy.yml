name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          PYTHONUTF8: 1
        run: |
          python generate_once.py
          echo "✅ Generated index.html successfully"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages (Fast Mode)
        run: |
          git checkout -b gh-pages --force 2>NUL || git checkout gh-pages
          git add -f index.html screenshots/*.png 2>NUL || git add -f index.html
          git commit -m "Auto deploy: $(date -u)" --allow-empty
          git push origin gh-pages --force
          echo "✅ Deployed to https://llmic.github.io/pc-monitor/"